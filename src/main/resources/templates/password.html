<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .error { color: red; font-weight: bold; margin-bottom: 15px; }
        .success { color: green; font-weight: bold; margin-bottom: 15px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; }
        .field input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #14B8A6; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>修改密碼</h2>

    <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/password}" method="post">
        <div class="field">
            <label>舊密碼：</label>
            <input type="password" name="oldPassword" required>
        </div>
        <div class="field">
            <label>新密碼 (至少 8 碼)：</label>
            <input type="password" name="newPassword" minlength="8" required>
        </div>
        <div class="field">
            <label>新密碼確認：</label>
            <input type="password" name="confirmPassword" minlength="8" required>
        </div>
        <button type="submit">確認修改</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/dashboard}">← 返回 Dashboard</a>
    </p>

</body>
</html>
